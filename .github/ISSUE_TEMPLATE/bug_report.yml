name: Bug report
description: Something isn't working as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below so the issue is reproducible.

        ⚠️ **Never paste the contents of your `auth.json`** — it contains secrets.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `codexswitcher ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: codexswitcher version
      description: Output of `codexswitcher --version`
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.4"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Any stack traces or CLI output (with secrets redacted).
      render: shell
